server {
    listen 127.0.0.1:8080;
    server_name _;

    root /srv/agent-reports;
    index index.html;
    autoindex off;

    # Do not expose dotfiles such as .env, .git, .DS_Store, etc.
    location ~ (^|/)\. {
        return 404;
    }

    # Root should not reveal anything.
    location = / {
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;

        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Secure static-report default: HTML/CSS/images only, no JavaScript.
        # For interactive reports, prefer local same-origin JS and update this deliberately.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'none'; base-uri 'none'; frame-ancestors 'none';" always;
    }
}
